name: 🌍 Deploy demo

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  cancel-in-progress: true
  group: deploy-${{ github.ref }}

jobs:
  build:
    name: Deployment demo on gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci

      - name: Build
        env:
          NODE_ENV: production # JS build mode
          PRODUCTION: true # for environment (ex: robots.txt)
          SENTRY_URL: https://sentry.incubateur.net
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: betagouv
          SENTRY_PROJECT: template-nextjs
          SENTRY_RELEASE_UPLOAD: true
          SENTRY_LOG_LEVEL: debug
        run: |
          npm run build
          touch out/.nojekyll

      # deploy build to gh-pages
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f
        with:
          branch: gh-pages
          folder: out
